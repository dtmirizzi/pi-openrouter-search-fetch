<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="modality" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer orbital rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#ring)" stroke-width="1"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#ring)" stroke-width="0.5"/>

  <!-- Central node - stylized route/network node inspired by OpenRouter branding -->
  <g filter="url(#softGlow)">
    <!-- Outer ring of central node -->
    <circle cx="256" cy="256" r="58" fill="none" stroke="url(#glow)" stroke-width="3"/>

    <!-- Inner filled circle -->
    <circle cx="256" cy="256" r="32" fill="url(#glow)" opacity="0.15"/>

    <!-- Stylized "P" letterform -->
    <text x="256" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="180" font-weight="700" fill="url(#glow)" text-anchor="middle" dominant-baseline="middle" opacity="0.9">P</text>
  </g>

  <!-- Connection lines from center to modality nodes -->
  <line x1="256" y1="256" x2="256" y2="56" stroke="#6C3CE1" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="411" y2="101" stroke="#7C3CED" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="456" y2="256" stroke="#8B5CF6" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="411" y2="411" stroke="#7C3CED" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="256" y2="456" stroke="#6C3CE1" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="101" y2="411" stroke="#5B2CD5" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="56" y2="256" stroke="#5B2CD5" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="256" x2="101" y2="101" stroke="#6C3CE1" stroke-width="1.5" opacity="0.35"/>

  <!-- Modality orbit nodes -->

  <!-- Search (magnifying glass) - top -->
  <circle cx="256" cy="56" r="22" fill="#1a1a3e" stroke="#6C3CE1" stroke-width="2"/>
  <circle cx="256" cy="56" r="14" fill="none" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="266" y1="66" x2="276" y2="76" stroke="#00D4FF" stroke-width="3" stroke-linecap="round"/>

  <!-- Image generation (paint palette) - top right -->
  <circle cx="411" cy="101" r="22" fill="#1a1a3e" stroke="#7C3CED" stroke-width="2"/>
  <circle cx="411" cy="101" r="8" fill="#00D4FF" opacity="0.8"/>
  <circle cx="418" cy="108" r="5" fill="#6C3CE1"/>
  <circle cx="403" cy="108" r="5" fill="#FF6B6B"/>
  <circle cx="411" cy="95" r="5" fill="#FBBF24"/>

  <!-- Image understanding (eye) - right -->
  <circle cx="456" cy="256" r="22" fill="#1a1a3e" stroke="#8B5CF6" stroke-width="2"/>
  <ellipse cx="456" cy="256" rx="12" ry="8" fill="none" stroke="#00D4FF" stroke-width="2"/>
  <circle cx="456" cy="256" r="4" fill="#00D4FF"/>

  <!-- Audio / TTS (sound wave) - bottom right -->
  <circle cx="411" cy="411" r="22" fill="#1a1a3e" stroke="#7C3CED" stroke-width="2"/>
  <path d="M404 411 Q408 403 408 411 Q408 419 404 411" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M411 403 Q417 395 417 411 Q417 427 411 419" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M418 398 Q426 388 426 411 Q426 434 418 424" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Video / Film - bottom -->
  <circle cx="256" cy="456" r="22" fill="#1a1a3e" stroke="#6C3CE1" stroke-width="2"/>
  <rect x="244" y="448" width="24" height="16" rx="3" fill="none" stroke="#00D4FF" stroke-width="2"/>
  <polygon points="260,452 260,460 268,456" fill="#00D4FF"/>

  <!-- Speech-to-text (mic) - bottom left -->
  <circle cx="101" cy="411" r="22" fill="#1a1a3e" stroke="#5B2CD5" stroke-width="2"/>
  <path d="M101 405 L101 415" stroke="#00D4FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M94 410 Q101 420 108 410" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M92 406 Q101 423 110 406" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Fetch / Link (chain) - left -->
  <circle cx="56" cy="256" r="22" fill="#1a1a3e" stroke="#5B2CD5" stroke-width="2"/>
  <path d="M50 249 Q45 245 48 241 Q52 236 57 240 L62 245" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M62 263 Q67 267 64 271 Q60 276 55 272 L50 267" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="250" x2="60" y2="262" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- PDF / Document - top left -->
  <circle cx="101" cy="101" r="22" fill="#1a1a3e" stroke="#6C3CE1" stroke-width="2"/>
  <path d="M93 92 L101 92 L107 98 L107 110 L93 110 Z" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="97" y1="100" x2="104" y2="100" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="97" y1="104" x2="104" y2="104" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="97" y1="108" x2="102" y2="108" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
